services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: interactive_ai_profile
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d interactive_ai_profile"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      # Not used until Phase 2.2 (DB wiring). Safe to set now.
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/interactive_ai_profile
    depends_on:
      postgres:
        condition: service_healthy